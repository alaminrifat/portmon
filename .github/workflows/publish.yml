name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Do not set registry-url here — it injects a dummy NODE_AUTH_TOKEN
      # (XXXXX-XXXXX-XXXXX-XXXXX) that breaks trusted publishing with 404.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Show npm/node versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish (OIDC trusted publisher)
        run: npm publish --access public --provenance
