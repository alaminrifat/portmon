name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Trusted publishing needs Node >= 22.14 and npm >= 11.5.1
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - name: Show npm/node versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Do NOT set NODE_AUTH_TOKEN when using Trusted Publishing.
      # An empty secret becomes "" and breaks OIDC with ENEEDAUTH.
      - name: Publish
        run: npm publish --access public --provenance
