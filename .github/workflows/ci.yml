name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: CLI smoke test
        run: |
          node dist/cli.js --version
          node dist/cli.js --help
          # Subcommand options must be parsed; write JSON and validate
          node dist/cli.js list --json | tee /tmp/ports.json
          node --input-type=module -e "import fs from 'fs'; const d=JSON.parse(fs.readFileSync('/tmp/ports.json','utf8')); if (!Array.isArray(d)) throw new Error('expected array'); console.log('list --json ok', d.length)"
